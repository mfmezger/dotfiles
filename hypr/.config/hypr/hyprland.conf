$mod = SUPER
$terminal = ghostty
$browser = brave
$file_manager = thunar
$launcher = rofi -show combi -combi-modes "drun,run,calc"
$window_switcher = rofi -show window
$screenshot = $HOME/dotfiles/scripts/screenshot.sh
$audio_switcher = $HOME/dotfiles/scripts/switch_audio_output.sh
$power_profile_menu = $HOME/dotfiles/scripts/power_profile_menu.sh

monitor = HDMI-A-1,preferred,0x0,1,transform,3
monitor = DP-1,2560x1440@144,1440x605,1
monitor = DP-2,2560x1440@100,4000x605,1
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-2, default:true
workspace = 3, monitor:HDMI-A-1, default:true
env = GTK_THEME,Adwaita:dark
env = GTK_APPLICATION_PREFER_DARK_THEME,1

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = $HOME/dotfiles/scripts/start_keyring.sh
exec-once = dunst
exec-once = waybar
exec-once = hypridle
exec-once = sleep 2 && $HOME/dotfiles/scripts/set_digital_vibrance.sh
exec-once = sleep 2 && ghostty

input {
  kb_layout = eu
  follow_mouse = 1
  repeat_delay = 300
  repeat_rate = 30
}

general {
  border_size = 2
  gaps_in = 5
  gaps_out = 20
  layout = dwindle
  col.active_border = rgba(5294e2ff)
  col.inactive_border = rgba(08052be6)
}

decoration {
  rounding = 10
  rounding_power = 2
  active_opacity = 1.0
  inactive_opacity = 1.0
  blur {
    enabled = false
  }
}

animations {
  enabled = false
}

dwindle {
  preserve_split = true
  pseudotile = true
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = false
  disable_splash_rendering = true
  focus_on_activate = true
}

windowrule {
  name = float-pavucontrol
  match:class = ^(pavucontrol)$
  float = yes
}

windowrule {
  name = float-nm-connection-editor
  match:class = ^(nm-connection-editor)$
  float = yes
}

windowrule {
  name = float-blueberry
  match:class = ^(blueberry.py)$
  float = yes
}

windowrule {
  name = float-galculator
  match:class = ^(galculator)$
  float = yes
}

windowrule {
  name = float-thunar-progress
  match:class = ^(thunar)$
  match:title = ^(File Operation Progress)$
  float = yes
}

windowrule {
  name = workspace-1-ghostty
  match:class = ^(ghostty)$
  workspace = 1
}

windowrule {
  name = workspace-2-brave-browser
  match:class = ^(Brave-browser)$
  workspace = 2
}

windowrule {
  name = workspace-2-brave-browser-lower
  match:class = ^(brave-browser)$
  workspace = 2
}

windowrule {
  name = workspace-3-thunar
  match:class = ^(thunar)$
  workspace = 3
}

windowrule {
  name = workspace-4-thunderbird
  match:class = ^(thunderbird)$
  workspace = 4
}

windowrule {
  name = workspace-5-telegram-org
  match:class = ^(org.telegram.desktop)$
  workspace = 5
}

windowrule {
  name = workspace-5-telegram-desktop
  match:class = ^(TelegramDesktop)$
  workspace = 5
}

bind = $mod, RETURN, exec, $terminal
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exec, wlogout
bind = $mod, L, exec, pidof hyprlock || hyprlock
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, SPACE, togglefloating,
bind = $mod, SPACE, cyclenext, floating
bind = $mod, ESCAPE, fullscreen, 0

bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, B, movefocus, u
bind = $mod, O, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, B, movewindow, u
bind = $mod SHIFT, O, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

bind = $mod, E, togglesplit,
bind = $mod, G, pseudo,
bind = $mod, TAB, workspace, e+1
bind = $mod SHIFT, TAB, workspace, e-1

bind = $mod, D, exec, $launcher
bind = $mod, T, exec, $window_switcher
bind = $mod, W, exec, $browser
bind = $mod, N, exec, $file_manager
bind = , Print, exec, $screenshot
bind = $mod, P, exec, $audio_switcher
bind = $mod SHIFT, P, exec, $power_profile_menu

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = $mod, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 1%+
binde = $mod, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

bind = $mod, R, submap, resize

submap = resize
binde = , left, resizeactive, -20 0
binde = , down, resizeactive, 0 20
binde = , up, resizeactive, 0 -20
binde = , right, resizeactive, 20 0
binde = , j, resizeactive, -20 0
binde = , k, resizeactive, 0 20
binde = , b, resizeactive, 0 -20
binde = , o, resizeactive, 20 0
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset
