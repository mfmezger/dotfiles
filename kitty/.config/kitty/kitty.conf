# Font settings
font_family CaskaydiaCove Nerd Font Mono
font_size 11.0

# Scrollback behavior
scrollback_lines 5000
scrollback_indicator_opacity 1.0

# URL handling and clipboard behavior
detect_urls yes
show_hyperlink_targets yes
copy_on_select yes

# Transparent background with a subtle blur effect
background_opacity 0.5
background_blur 1

# macOS-style window navigation shortcuts
map cmd+right next_window
map cmd+left previous_window
